<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fyzika pro ZŠ – Práce a výkon</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Písmo -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Vlastní styl -->
  <link rel="stylesheet" href="style.css"/>
</head>

<body class="bg-gray-900 text-gray-200 font-inter">
  <div class="app-container p-4">
    <div class="main-card max-w-3xl mx-auto bg-gray-800 rounded-2xl shadow-lg p-6 space-y-6">

      <!-- Úvodní obrazovka -->
      <div id="setup-screen">
        <h1 class="text-3xl font-bold text-center text-white mb-2">Fyzika hrou</h1>
        <p class="text-center text-gray-400 mb-8">Procvičování úloh pro základní školy</p>

        <div class="space-y-6">
          <div>
            <label class="block text-lg font-semibold mb-3">1️⃣ Zvolte režim</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <button id="mode-practice" class="btn btn-secondary">Procvičování</button>
              <button id="mode-test" class="btn btn-secondary">Test</button>
            </div>
          </div>

          <div>
            <label class="block text-lg font-semibold mb-3">2️⃣ Zvolte úroveň</label>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <button id="level-easy" class="btn btn-secondary">Jednoduchá</button>
              <button id="level-normal" class="btn btn-secondary">Normální</button>
              <button id="level-hard" class="btn btn-secondary">Obtížná</button>
            </div>
          </div>

          <div>
            <label for="topic-select" class="block text-lg font-semibold mb-3">3️⃣ Vyberte téma</label>
            <select id="topic-select" class="w-full p-3 rounded-xl bg-gray-900 border border-gray-700 focus:ring-2 focus:ring-blue-500">
              <option value="prace">Práce (W)</option>
              <option value="vykon">Výkon (P)</option>
            </select>
          </div>

          <div>
            <button id="start-button" class="btn btn-primary w-full btn-disabled" disabled>Spustit</button>
          </div>
        </div>
      </div>

      <!-- Hlavní aplikace -->
      <div id="practice-screen" class="hidden">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 id="practice-title" class="text-2xl font-bold text-blue-400">Téma: Práce</h2>
            <button id="back-button" class="text-sm text-gray-400 hover:text-blue-400">&larr; Zpět na výběr</button>
          </div>
          <button id="new-problem-button" class="btn btn-secondary text-sm">Nový příklad</button>
        </div>

        <!-- Zadání -->
        <div id="problem-wrapper" class="mb-4">
          <div id="problem-container" class="p-4 bg-gray-900 border border-dashed border-gray-600 rounded-xl">
            <p id="problem-text" class="text-lg leading-relaxed"></p>
          </div>
        </div>

        <!-- NOVÁ TLAČÍTKA -->
        <div id="tools-container" class="flex flex-wrap justify-end gap-2 mb-6">
          <button id="open-diagram-button" class="btn btn-secondary text-sm py-1 px-3 flex items-center gap-1">🖼 Obrázek</button>
          <button id="open-formula-button" class="btn btn-secondary text-sm py-1 px-3 flex items-center gap-1">📐 Vzorec</button>
          <button id="open-help-button" class="btn btn-secondary text-sm py-1 px-3 flex items-center gap-1">💡 Nápověda</button>
          <button id="open-calculator-button" class="btn btn-secondary text-sm py-1 px-3 flex items-center gap-1">🧮 Kalkulačka</button>
        </div>

        <!-- Krok 1: Zápis -->
        <div id="zapis-step">
          <h3 class="text-lg font-semibold mb-3">1️⃣ Proveďte zápis</h3>
          <p class="text-sm text-gray-400 mb-4">
            Vyberte známé veličiny, doplňte hodnoty a jednotky.  
            Označte hledanou veličinu.
          </p>
          <div id="zapis-container" class="space-y-2 mb-4"></div>
          <button id="add-zapis-row-button" class="btn btn-secondary w-full mb-4">+ Přidat veličinu</button>
          <button id="check-zapis-button" class="btn btn-primary w-full">Zkontrolovat zápis</button>
          <div id="zapis-feedback-container" class="mt-4"></div>
        </div>

        <!-- Krok 2: Výpočet -->
        <div id="vypocet-step" class="hidden">
          <div id="zapis-review-container" class="p-4 bg-gray-900 border border-gray-700 rounded-xl mb-6"></div>

          <h3 class="text-lg font-semibold mb-3">3️⃣ Finální výpočet</h3>
          <p class="text-sm text-gray-400 mb-4">Sestavte vzorec, dosaďte hodnoty a vypočítejte výsledek.</p>

          <div class="space-y-4">
            <div>
              <label for="formula-input" class="block text-sm mb-1">Vzorec:</label>
              <input id="formula-input" type="text" placeholder="např. W = F * s"
                     class="w-full p-3 rounded-xl bg-gray-900 border border-gray-700 focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label for="substitution-input" class="block text-sm mb-1">Dosazení:</label>
              <input id="substitution-input" type="text" placeholder="např. W = 100 * 5"
                     class="w-full p-3 rounded-xl bg-gray-900 border border-gray-700 focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label for="user-answer" class="block text-sm mb-1">Výsledek:</label>
              <div class="flex gap-2">
                <input id="user-answer" type="number" placeholder="Zadejte výsledek"
                       class="w-full p-3 rounded-xl bg-gray-900 border border-gray-700 focus:ring-2 focus:ring-blue-500">
                <select id="unit-select" class="w-32 p-3 rounded-xl bg-gray-900 border border-gray-700 focus:ring-2 focus:ring-blue-500"></select>
              </div>
            </div>
          </div>

          <button id="check-calculation-button" class="btn btn-primary w-full mt-6">Ověřit výpočet</button>
          <div id="vypocet-feedback-container" class="mt-4"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODÁLY -->
  <!-- Kalkulačka -->
  <div id="calculator-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl shadow-lg p-4 w-full max-w-xs space-y-4 relative">
      <button id="close-calculator-button" class="absolute top-3 right-3 text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      <div class="bg-gray-900 rounded-lg p-4 text-right">
        <div id="calculator-history" class="text-gray-500 text-sm h-6 mb-1 overflow-x-auto"></div>
        <div id="calculator-display" class="text-white text-4xl font-light break-all">0</div>
      </div>
      <div id="calculator-buttons" class="grid grid-cols-4 gap-2"></div>
    </div>
  </div>

  <!-- Vzorec -->
  <div id="formula-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl shadow-lg p-6 w-full max-w-md space-y-4 relative text-center">
      <button id="close-formula-button" class="absolute top-3 right-3 text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      <h3 class="text-xl font-semibold text-white mb-4">Vzorec</h3>
      <div id="formula-svg-container" class="flex justify-center items-center"></div>
    </div>
  </div>

  <!-- Obrázek -->
  <div id="diagram-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl shadow-lg p-6 w-full max-w-md space-y-4 relative text-center">
      <button id="close-diagram-button" class="absolute top-3 right-3 text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      <h3 class="text-xl font-semibold text-white mb-4">Obrázek</h3>
      <div id="diagram-svg-container" class="flex justify-center items-center"></div>
    </div>
  </div>

  <!-- Nápověda -->
  <div id="help-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl shadow-lg p-6 w-full max-w-sm space-y-4 relative text-center">
      <button id="close-help-button" class="absolute top-3 right-3 text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      <h3 class="text-xl font-semibold text-white mb-4">Nápověda</h3>
      <div id="help-content" class="text-gray-200 text-sm leading-relaxed"></div>
    </div>
  </div>

  <!-- JS -->
  <script src="app.js" defer></script>
  <script>
    // Zkontroluj, že app_final_calc_v4.js existuje a načte se později
    console.log("🧩 Pokus o načtení app_final_calc_v4.js ...");
  </script>
  <script src="./app_final_calc_v4.js" defer></script>
</body>
</html>
